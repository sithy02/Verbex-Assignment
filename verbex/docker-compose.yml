services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    dns:
      - 8.8.8.8
      - 8.8.4.4

  agent-service:
    build: ./services/agent-service
    ports:
      - "8082:8082"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8082 --reload
    depends_on:
      - auth-service
    dns:
      - 8.8.8.8
      - 8.8.4.4

  chat-service:
    build: ./services/chat-service
    ports:
      - "8083:8083"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8083 --reload
    depends_on:
      - auth-service
      - agent-service
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - auth-service
      - agent-service
      - chat-service